<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeX - Professional Stock Dashboard</title>
    
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        'inter': ['Inter', 'sans-serif'],
                    },
                    colors: {
                        'dark-bg': '#0a0e1a',
                        'dark-card': '#141925',
                        'dark-border': '#2a3344',
                        'accent-blue': '#2962ff',
                        'accent-green': '#00c853',
                        'accent-red': '#ff1744',
                        'accent-yellow': '#ffab00',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-bg text-gray-100 font-inter antialiased overflow-x-hidden">
    <!-- Main Container -->
    <div class="flex h-screen overflow-hidden">
        
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-dark-card border-r border-dark-border transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
            <!-- Logo -->
            <div class="flex items-center justify-between p-4 border-b border-dark-border">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                        <i class="fas fa-chart-line text-white text-lg"></i>
                    </div>
                    <span class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">TradeX</span>
                </div>
                <button id="close-sidebar" class="md:hidden text-gray-400 hover:text-white">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <!-- Navigation Menu -->
            <nav class="flex-1 overflow-y-auto py-4 px-3">
                <ul class="space-y-1">
                    <li>
                        <button onclick="navigateTo('home')" class="nav-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-all duration-200 hover:bg-gray-800/50 active" data-page="home">
                            <i class="fas fa-home w-5 text-center"></i>
                            <span class="font-medium">Home</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="navigateTo('market')" class="nav-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-all duration-200 hover:bg-gray-800/50" data-page="market">
                            <i class="fas fa-chart-bar w-5 text-center"></i>
                            <span class="font-medium">Market</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="navigateTo('watchlist')" class="nav-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-all duration-200 hover:bg-gray-800/50" data-page="watchlist">
                            <i class="fas fa-star w-5 text-center"></i>
                            <span class="font-medium">Watchlist</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="navigateTo('education')" class="nav-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-all duration-200 hover:bg-gray-800/50" data-page="education">
                            <i class="fas fa-graduation-cap w-5 text-center"></i>
                            <span class="font-medium">Edukasi</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="navigateTo('news')" class="nav-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-all duration-200 hover:bg-gray-800/50" data-page="news">
                            <i class="fas fa-newspaper w-5 text-center"></i>
                            <span class="font-medium">Berita</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="navigateTo('about')" class="nav-item w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-all duration-200 hover:bg-gray-800/50" data-page="about">
                            <i class="fas fa-info-circle w-5 text-center"></i>
                            <span class="font-medium">Tentang</span>
                        </button>
                    </li>
                </ul>
            </nav>
            
            <!-- Footer Sidebar -->
            <div class="p-4 border-t border-dark-border">
                <div class="flex items-center justify-between text-xs text-gray-500">
                    <span>© 2024 TradeX</span>
                    <span class="text-blue-400">by rayxer</span>
                </div>
                <div class="text-xs text-gray-600 mt-1 text-center">
                    API: X9VVFFCU4I97EBMG
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden md:ml-64">
            <!-- Top Navigation Bar -->
            <header class="bg-dark-card border-b border-dark-border p-4 flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <button id="menu-toggle" class="md:hidden text-gray-400 hover:text-white focus:outline-none">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                    <div class="relative w-full max-w-md">
                        <input type="text" id="global-search" placeholder="Search stocks, news, or education..." 
                               class="w-full bg-gray-900/50 border border-dark-border rounded-xl py-2 pl-10 pr-4 text-sm text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-transparent transition-all">
                        <i class="fas fa-search absolute left-3 top-2.5 text-gray-500"></i>
                    </div>
                </div>
                
                <div class="flex items-center space-x-4">
                    <button class="relative p-2 text-gray-400 hover:text-white transition-colors">
                        <i class="fas fa-bell"></i>
                        <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                    </button>
                    <div class="w-8 h-8 rounded-full bg-gradient-to-r from-blue-500 to-purple-600 flex items-center justify-center">
                        <i class="fas fa-user text-white text-sm"></i>
                    </div>
                </div>
            </header>
            
            <!-- Content Area -->
            <div class="flex-1 overflow-y-auto p-4 md:p-6" id="content-area">
                <!-- Content will be loaded here dynamically -->
            </div>
        </main>
    </div>
    
    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 z-50 transform translate-y-20 opacity-0 transition-all duration-300">
        <div class="bg-dark-card border border-dark-border text-white px-6 py-3 rounded-lg shadow-xl flex items-center space-x-3">
            <i id="toast-icon" class="fas"></i>
            <span id="toast-message"></span>
        </div>
    </div>
    
    <!-- Loading Spinner -->
    <div id="loader" class="fixed inset-0 z-50 flex items-center justify-center bg-dark-bg/80 backdrop-blur-sm hidden">
        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
